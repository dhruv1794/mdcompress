name: Benchmark & Deploy Pages
on:
  schedule:
    - cron: '0 6 * * 1'           # every Monday 06:00 UTC
  workflow_dispatch:               # manual trigger
  push:
    branches: [main]
    paths:
      - 'pkg/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - 'docs/site/**'
      - 'docs/benchmark-repos.json'
      - '.github/workflows/benchmark.yml'

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      repos: ${{ steps.repos.outputs.repos }}
    steps:
      - uses: actions/checkout@v4
      - id: repos
        run: |
          repos=$(jq -c '.repos' docs/benchmark-repos.json)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  bench:
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.matrix.outputs.repos) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }

      - name: Build mdcompress
        run: go build -o mdcompress ./cmd/mdcompress

      - name: Benchmark ${{ matrix.repo.name }}
        run: |
          MDCOMPRESS="$(pwd)/mdcompress"
          BENCHDIR=/tmp/bench
          mkdir -p "$BENCHDIR"

          NAME='${{ matrix.repo.name }}'
          URL='${{ matrix.repo.url }}'
          SLUG=$(echo "$NAME" | awk '{print tolower($0)}' | sed 's/[^a-z0-9]/_/g')
          DIR="$BENCHDIR/$SLUG"
          OUT="$BENCHDIR/result.json"

          rm -rf "$DIR"
          if ! git clone --depth 1 --quiet "$URL" "$DIR"; then
            echo "SKIP: clone failed for $NAME"
            jq -n --arg name "$NAME" '{name:$name, skipped:true}' > "$OUT"
            cp "$OUT" "result-$SLUG.json"
            exit 0
          fi

          TIER1_BEFORE=0; TIER1_AFTER=0; TIER1_FILES=0; TIER1_RULES='{}'; TIER1_BYTES='{}'; TIER1_ERROR=''
          TIER2_BEFORE=0; TIER2_AFTER=0; TIER2_RULES='{}'; TIER2_BYTES='{}'; TIER2_ERROR=''
          README_BEFORE=0; README_AFTER=0

          mkdir -p "$DIR/.mdcompress"
          LOGDIR="$BENCHDIR/logs/$SLUG"
          mkdir -p "$LOGDIR"

          run_tier() {
            local label=$1 logfile=$2
            (cd "$DIR" && "$MDCOMPRESS" run --all) >"$logfile.out" 2>"$logfile.err"
            local rc=$?
            if [ $rc -ne 0 ]; then
              echo "::warning title=$NAME $label::mdcompress exited $rc"
              echo "--- $label stderr (tail) ---"
              tail -n 40 "$logfile.err" || true
              echo "--- end ---"
            fi
            return $rc
          }

          # Tier-1 (safe)
          printf 'version: 1\ntier: safe\nrules:\n  disabled: []\n' > "$DIR/.mdcompress/config.yaml"
          if ! run_tier "Tier-1" "$LOGDIR/tier1"; then
            TIER1_ERROR=$(tail -n 1 "$LOGDIR/tier1.err" 2>/dev/null | tr -d '\r' | head -c 200)
            : ${TIER1_ERROR:=mdcompress run failed}
          fi
          if [ -f "$DIR/.mdcompress/manifest.json" ]; then
            TIER1_BEFORE=$(jq '.totals.tokens_before' "$DIR/.mdcompress/manifest.json")
            TIER1_AFTER=$(jq '.totals.tokens_after' "$DIR/.mdcompress/manifest.json")
            TIER1_FILES=$(jq '.totals.files' "$DIR/.mdcompress/manifest.json")
            TIER1_RULES=$(jq -c '[.entries | to_entries | .[].value.rules_fired] | add' "$DIR/.mdcompress/manifest.json")
            TIER1_BYTES=$(jq -c '[.entries | to_entries | .[].value.rule_bytes_saved // {}] | add // {}' "$DIR/.mdcompress/manifest.json")
          elif [ -z "$TIER1_ERROR" ]; then
            TIER1_ERROR="no manifest.json produced"
          fi

          # Tier-2 (aggressive). dedup-cross-section is opt-out per file due
          # to its 256KB-per-file size guard; README-only pass below measures
          # its impact.
          printf 'version: 1\ntier: aggressive\nrules:\n  disabled:\n    - dedup-cross-section\n  enabled:\n    - strip-boilerplate-sections\n    - collapse-example-output\n' > "$DIR/.mdcompress/config.yaml"
          rm -rf "$DIR/.mdcompress/cache" "$DIR/.mdcompress/manifest.json"
          if ! run_tier "Tier-2" "$LOGDIR/tier2"; then
            TIER2_ERROR=$(tail -n 1 "$LOGDIR/tier2.err" 2>/dev/null | tr -d '\r' | head -c 200)
            : ${TIER2_ERROR:=mdcompress run failed}
          fi
          if [ -f "$DIR/.mdcompress/manifest.json" ]; then
            TIER2_BEFORE=$(jq '.totals.tokens_before' "$DIR/.mdcompress/manifest.json")
            TIER2_AFTER=$(jq '.totals.tokens_after' "$DIR/.mdcompress/manifest.json")
            TIER2_RULES=$(jq -c '[.entries | to_entries | .[].value.rules_fired] | add' "$DIR/.mdcompress/manifest.json")
            TIER2_BYTES=$(jq -c '[.entries | to_entries | .[].value.rule_bytes_saved // {}] | add // {}' "$DIR/.mdcompress/manifest.json")
          elif [ -z "$TIER2_ERROR" ]; then
            TIER2_ERROR="no manifest.json produced"
          fi

          # README-only (aggressive tier)
          README_PATH=$(cd "$DIR" && find . -maxdepth 1 -iname 'readme.md' | head -1)
          if [ -n "$README_PATH" ] && [ -f "$DIR/$README_PATH" ]; then
            README_STATS=$(cd "$DIR" && "$MDCOMPRESS" compress --tier=aggressive --enable-rule=strip-boilerplate-sections --enable-rule=collapse-example-output "$README_PATH" 2>&1 >/dev/null) || true
            README_TOKENS=$(echo "$README_STATS" | sed -nE 's/^tokens[^:]*: ([0-9]+) -> ([0-9]+).*/\1 \2/p')
            README_BEFORE=$(echo "$README_TOKENS" | awk '{print $1}')
            README_AFTER=$(echo "$README_TOKENS" | awk '{print $2}')
            : ${README_BEFORE:=0}
            : ${README_AFTER:=0}
          fi

          : ${TIER1_BEFORE:=0}; : ${TIER1_AFTER:=0}; : ${TIER1_FILES:=0}; : ${TIER1_RULES:="{}"}; : ${TIER1_BYTES:="{}"}
          : ${TIER2_BEFORE:=0}; : ${TIER2_AFTER:=0}; : ${TIER2_RULES:="{}"}; : ${TIER2_BYTES:="{}"}
          : ${README_BEFORE:=0}; : ${README_AFTER:=0}

          jq -n --arg name "$NAME" \
             --argjson t1b "$TIER1_BEFORE" --argjson t1a "$TIER1_AFTER" \
             --argjson t1f "$TIER1_FILES" \
             --argjson t2b "$TIER2_BEFORE" --argjson t2a "$TIER2_AFTER" \
             --argjson rb "$README_BEFORE" --argjson ra "$README_AFTER" \
             --argjson t1r "$TIER1_RULES" --argjson t2r "$TIER2_RULES" \
             --argjson t1bs "$TIER1_BYTES" --argjson t2bs "$TIER2_BYTES" \
             --arg t1err "$TIER1_ERROR" --arg t2err "$TIER2_ERROR" \
             '{name:$name, tier1_before:$t1b, tier1_after:$t1a, tier1_files:$t1f, tier2_before:$t2b, tier2_after:$t2a, readme_before:$rb, readme_after:$ra, tier1_rules:$t1r, tier2_rules:$t2r, tier1_bytes_saved:$t1bs, tier2_bytes_saved:$t2bs, tier1_error:$t1err, tier2_error:$t2err}' \
             > "result-$SLUG.json"

      - uses: actions/upload-artifact@v4
        with:
          name: bench-${{ strategy.job-index }}
          path: result-*.json
          if-no-files-found: warn
          retention-days: 1

  combine:
    needs: bench
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/bench-results
          pattern: bench-*
          merge-multiple: true

      - name: Combine results
        run: |
          shopt -s nullglob
          files=(/tmp/bench-results/result-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo '[]' > docs/site/public/benchmark-data.json
          else
            jq -s '[ .[] | select(.skipped != true) ]' "${files[@]}" > docs/site/public/benchmark-data.json
          fi
          jq 'length' docs/site/public/benchmark-data.json

      - name: Build React site
        run: |
          npm ci
          npm run build
        working-directory: docs/site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

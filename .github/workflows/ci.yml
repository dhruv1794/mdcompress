name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test ./...
      - name: Detect rule changes
        id: rule_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          head="${{ github.sha }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            changed="$(git ls-files pkg/rules)"
          else
            changed="$(git diff --name-only "$base" "$head" -- pkg/rules/)"
          fi
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Tier-1 eval baseline
        if: steps.rule_changes.outputs.changed == 'true'
        run: go test ./pkg/eval -run TestTier1BaselineEvalCorpus -count=1
      - run: go build ./cmd/mdcompress
